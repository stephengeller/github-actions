name: Auto Downstream PR (trigger)
description: >
  Runs in an upstream repo on PR merge. Fires a workflow_dispatch at the
  downstream repo's auto-downstream-pr workflow, passing the upstream PR
  metadata as inputs.
author: amberelectric
inputs:
  token:
    description: >
      Token with actions:write on the downstream repo. Use
      actions/create-github-app-token to mint one from a GitHub App.
    required: true
  downstream-repo:
    description: "owner/repo that hosts the bump workflow (e.g. amberelectric/amber-core)."
    required: true
  downstream-workflow:
    description: >
      Workflow file name or ID in the downstream repo to dispatch
      (e.g. "bump-from-oem.yml").
    required: true
  downstream-ref:
    description: Branch of the downstream repo to dispatch the workflow on.
    required: false
    default: main
  integration-name:
    description: Short slug for this integration (e.g. "growatt").
    required: true

runs:
  using: composite
  steps:
    - name: Guard on merged PR
      shell: bash
      run: |
        if [ "${{ github.event.pull_request.merged }}" != "true" ]; then
          echo "Upstream PR was closed without merging — skipping dispatch."
          exit 0
        fi

    - name: Dispatch downstream workflow
      if: github.event.pull_request.merged == true
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        DOWNSTREAM_REPO: ${{ inputs.downstream-repo }}
        DOWNSTREAM_WORKFLOW: ${{ inputs.downstream-workflow }}
        DOWNSTREAM_REF: ${{ inputs.downstream-ref }}
        INTEGRATION: ${{ inputs.integration-name }}
        UPSTREAM_REPO: ${{ github.repository }}
        UPSTREAM_PR: ${{ github.event.pull_request.number }}
        UPSTREAM_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        UPSTREAM_TITLE: ${{ github.event.pull_request.title }}
        UPSTREAM_AUTHOR: ${{ github.event.pull_request.user.login }}
        UPSTREAM_URL: ${{ github.event.pull_request.html_url }}
      run: |
        set -euo pipefail
        gh workflow run "${DOWNSTREAM_WORKFLOW}" \
          --repo "${DOWNSTREAM_REPO}" \
          --ref  "${DOWNSTREAM_REF}" \
          -f "integration-name=${INTEGRATION}" \
          -f "upstream-repo=${UPSTREAM_REPO}" \
          -f "upstream-pr-number=${UPSTREAM_PR}" \
          -f "upstream-sha=${UPSTREAM_SHA}" \
          -f "upstream-title=${UPSTREAM_TITLE}" \
          -f "upstream-author=${UPSTREAM_AUTHOR}" \
          -f "upstream-url=${UPSTREAM_URL}"

        {
          echo "### Dispatched downstream bump"
          echo "- Downstream: \`${DOWNSTREAM_REPO}\` (workflow: \`${DOWNSTREAM_WORKFLOW}\`)"
          echo "- Integration: \`${INTEGRATION}\`"
          echo "- Upstream PR: \`${UPSTREAM_REPO}#${UPSTREAM_PR}\` @ \`${UPSTREAM_SHA}\`"
        } >> "$GITHUB_STEP_SUMMARY"
