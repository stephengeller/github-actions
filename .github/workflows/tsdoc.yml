name: TSDoc Enforcer (self-dogfood)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Run report (no-AI) variant
        uses: ./report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  suggest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Run suggest (Claude) variant
        uses: ./
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          max-symbols-for-ai: "100"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
