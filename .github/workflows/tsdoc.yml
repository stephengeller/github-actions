name: TSDoc Enforcer (self-dogfood)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Run report (no-AI) variant
        uses: ./report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}